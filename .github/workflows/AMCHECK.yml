name: "AMCHECK"

on:
  push:
    branches: main
    paths:
      - 'programs/x86_64/**'
  repository_dispatch:
    types: [check]
  workflow_dispatch:
    inputs:
      reset_stats:
        description: "RESET stats"
        required: true
        default: false
        type: boolean
      retest_excluded:
        description: "TEST excluded"
        required: true
        default: false
        type: boolean
      what_test:
        description: "App names: (space between)"
        required: false
        default: ""
        type: string
      how_many:
        description: "Number of apps: (max 256)"
        required: false
        default: ''
        type: integer
  schedule:
    - cron: '0 * * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  actions: write
  contents: write

env:
  REPO: ${{ github.repository_owner }}/AM
  BRANCH: main
  TOTEST: 250

jobs:
  setup:
    name: "Setup & Matrix 🌀"
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.set-matrix.outputs.skip }}
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      tested_count: ${{ steps.stats.outputs.tested }}
      excluded_count: ${{ steps.stats.outputs.excluded }}
      total_count: ${{ steps.stats.outputs.all }}
    steps:
      - name: "Checkout AM"
        uses: actions/checkout@v6
        with:
          repository: ${{ env.REPO }}

      - name: "Reset stats 🔄"
        if: github.event.inputs.reset_stats == 'true'
        run: |
          echo "### stats RESET" >> $GITHUB_STEP_SUMMARY
          rm -rf results
          git config --global user.name web-flow
          git config --global user.email "noreply@github.com"
          git rm -r results || true
          git commit -m "reset stats" || true
          git push --force || true
          git clean -f

      - name: "Generate Matrix & Stats 📊"
        id: set-matrix
        if: github.event.inputs.reset_stats != 'true'
        run: |
          # 1. Generate full app list
          sort programs/x86_64-apps | grep -v "\"kdegames\"\|\"kdeutils\"\|\"node\"\|\"platform-tools\"\| ffwa-\|am-utils" | awk '{print $2}' > appslist.txt
          TOTAL=$(wc -l < appslist.txt)
          echo "all=$TOTAL" >> $GITHUB_OUTPUT

          # 2. Stats
          TESTED=0
          EXCLUDED=0
          [ -f results/tested ] && TESTED=$(wc -l < results/tested)
          [ -f results/excluded ] && EXCLUDED=$(wc -l < results/excluded)
          echo "tested=$TESTED" >> $GITHUB_OUTPUT
          echo "excluded=$EXCLUDED" >> $GITHUB_OUTPUT
          
          echo "### 🎬 apps: $TOTAL" >> $GITHUB_STEP_SUMMARY
          echo "🔨 tested: $TESTED" >> $GITHUB_STEP_SUMMARY
          echo "❌ excluded: $EXCLUDED" >> $GITHUB_STEP_SUMMARY

          # 3. Determine list to test
          # Use Python for safe JSON generation and logic
          python3 << 'EOF'
          import json
          import os

          reset = os.environ.get('RESET_STATS', 'false') == 'true'
          retest_excluded = os.environ.get('RETEST_EXCLUDED', 'false') == 'true'
          what_test = os.environ.get('WHAT_TEST', '').strip()
          how_many_input = os.environ.get('HOW_MANY', '')
          totest_env = os.environ.get('TOTEST', '250')

          apps = set()
          with open('appslist.txt', 'r') as f:
              apps = set(line.strip() for line in f)

          tested = set()
          if os.path.exists('results/tested'):
              with open('results/tested', 'r') as f:
                  tested = set(line.strip() for line in f)

          excluded = set()
          if os.path.exists('results/excluded'):
              with open('results/excluded', 'r') as f:
                  excluded = set(line.strip() for line in f)
          # Also check result-var/excluded if retest_excluded is true (legacy check)
          if retest_excluded and os.path.exists('result-var/excluded'):
              with open('result-var/excluded', 'r') as f:
                  excluded = set(line.strip() for line in f)

          candidates = list(apps - tested)
          
          # Logic branch
          files_to_run = []

          if what_test:
              files_to_run = what_test.split()
          elif retest_excluded:
              files_to_run = list(excluded)
              if not files_to_run:
                  print("Nothing excluded to test!")
                  exit(1)
          else:
              # Normal flow: remove excluded from candidates
              candidates = list(set(candidates) - excluded)
              
              if not candidates:
                  print("Nothing left to test!")
                  # Set skip output via file because env vars don't update dynamically
                  with open(os.getenv('GITHUB_OUTPUT'), 'a') as f:
                      f.write('skip=true\n')
                  exit(0)

              # Determine count
              count = int(how_many_input) if how_many_input.isdigit() else int(totest_env)
              files_to_run = candidates[:count]

          # Generate Matrix
          if not files_to_run:
               with open(os.getenv('GITHUB_OUTPUT'), 'a') as f:
                  f.write('skip=true\n')
          else:
              matrix = {"include": [{"file": f} for f in files_to_run]}
              with open(os.getenv('GITHUB_OUTPUT'), 'a') as f:
                  f.write(f'matrix={json.dumps(matrix)}\n')
          EOF
        env:
          RESET_STATS: ${{ github.event.inputs.reset_stats }}
          RETEST_EXCLUDED: ${{ github.event.inputs.retest_excluded }}
          WHAT_TEST: ${{ github.event.inputs.what_test }}
          HOW_MANY: ${{ github.event.inputs.how_many }}

  test-app:
    name: "🔨 ${{ matrix.file }}"
    needs: setup
    runs-on: ubuntu-latest
    if: ${{ needs.setup.outputs.skip != 'true' }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}
    steps:
      - name: "Checkout AM"
        uses: actions/checkout@v6
        with:
          repository: ${{ env.REPO }}

      - name: "Cache dependencies"
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: curl libnotify-bin ripgrep wget
          version: 1.0

      - name: "Fix AppArmor"
        run: |
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_unconfined=0
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0

      - name: "Install AM manually 🎁"
        run: |
          sudo mkdir -p /opt/am/modules /usr/local/bin
          sudo cp -r ./APP-MANAGER /opt/am/APP-MANAGER && sudo chmod a+x /opt/am/APP-MANAGER
          sudo ln -fs /opt/am/APP-MANAGER /usr/local/bin/am
          sudo touch /opt/am/remove
          sudo cp -r modules/*.am /opt/am/modules/
          export AMDATADIR="${XDG_DATA_HOME:-$HOME/.local/share}"/AM
          mkdir -p "$AMDATADIR"
          cp -r programs/x86_64-apps "$AMDATADIR"/

      - name: "Test App 🚧"
        id: test_app
        working-directory: programs/x86_64
        run: |
          # Setup Output Directory
          mkdir -p results
          OUT_FILE="results/out-${{ matrix.file }}"
          touch "$OUT_FILE"
          
          # Metadata extraction
          echo "APP=\"${{ matrix.file }}\"" | tee -a "$OUT_FILE"
          if grep -qe "appimage-extract\|mage\$\|tmp/\*mage" "${{ matrix.file }}" 1>/dev/null; then
            echo "APPIMAGE='yes'" | tee -a "$OUT_FILE"
          else
            echo "APPIMAGE='no'" | tee -a "$OUT_FILE"
          fi
          if grep -q "api.github.com" "${{ matrix.file }}" 2>/dev/null; then
            echo "GITHUB='yes'" | tee -a "$OUT_FILE"
          else
            echo "GITHUB='no'" | tee -a "$OUT_FILE"
          fi
          if grep -q "^SITE=" "${{ matrix.file }}" 2>/dev/null; then
            SITE=$(eval echo "$(grep -i '^SITE=' "${{ matrix.file }}" | head -1 | sed 's/SITE=//g')")
            echo "SITE=\"$SITE\"" | tee -a "$OUT_FILE"
          fi

          # Variables
          pure_arg=$(echo "${{ matrix.file }}" | sed 's/\-appimage$//g' | sed 's:.*/::')
          EXIT_CODE=0
          
          # Patches
          sed -i '/command -v "$pure_arg"/d; /command already exists/d' /opt/am/modules/install.am
          if [[ "$pure_arg" =~ (node|npm) ]]; then
            sed -i 's/_check_if_script_installs_a_metapackage || return 1//g' /opt/am/modules/install.am
          fi

          # Blacklists
          if [[ "$pure_arg" =~ (animashooter-junior|animashooter-pioneer) ]]; then
            echo "Blacklisted (Slow download)" | tee -a "results/log-${{ matrix.file }}"
            echo "${{ matrix.file }}" >> "results/ok-${{ matrix.file }}"
            exit 0
          fi
          if [[ "$pure_arg" =~ (mudlet|openxcom|openxcom-extended|vhc-viewer-wayland|vhc-viewer-x11) ]]; then
            echo "Blacklisted (Incompatible)" | tee -a "results/log-${{ matrix.file }}"
            echo "${{ matrix.file }}" >> "results/ok-${{ matrix.file }}"
            exit 0
          fi

          # Installation Function with Retries
          run_install() {
            local cmd="am -i \"${{ matrix.file }}\" --debug"
            local input="y"
            
            if grep -qe "^read " "${{ matrix.file }}" 1>/dev/null || [[ "$pure_arg" =~ (wine) ]]; then
              input="1"
            fi
            if [[ "$pure_arg" =~ (bat-extras) ]]; then
              cmd="am -i bat \"${{ matrix.file }}\" --debug"
            fi

            for i in {1..3}; do
              echo "$input" | timeout 1800 $cmd 2>&1 | tee -a "results/log-${{ matrix.file }}"
              
              # Check if installed (check for remove file in /opt)
              # Counting remove files. If > 1 (am + app), success.
              INSTALLED=$(find /opt -maxdepth 2 -name 'remove' | wc -l)
              if [ "$INSTALLED" -gt 1 ]; then
                return 0
              fi
              echo "Attempt $i failed or incomplete. Waiting 30s..."
              sleep 30
            done
            return 1
          }

          # Run Install
          if run_install; then
            echo "Install Successful."
          else
            echo "Install Failed after 3 attempts." | tee -a "results/log-${{ matrix.file }}"
            echo "### 💀 ${{ matrix.file }}" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          # Verification
          LASTDIR=$(ls -td /opt/* | head -1 | sed 's:.*/::')
          if [ "$LASTDIR" = "am" ]; then
            echo "Error: Only AM directory found." | tee -a "results/log-${{ matrix.file }}"
            exit 1
          fi

          if test -f /opt/"$LASTDIR"/remove; then
            printf "\n-------------------------------------------------------------\n\n" | tee -a "results/log-${{ matrix.file }}"
            echo " Structure of /opt/$LASTDIR" | tee -a "results/log-${{ matrix.file }}"
            ls /opt/"$LASTDIR" | tee -a "results/log-${{ matrix.file }}"
            
            # Icons
            if test -f /opt/"$LASTDIR"/icons/*; then
              mkdir -p results/icons
              cp -r /opt/"$LASTDIR"/icons/* results/icons/ 2>/dev/null || true
            fi

            printf "\n-------------------------------------------------------------\n\n" | tee -a "results/log-${{ matrix.file }}"
            echo " Command in \$PATH" | tee -a "results/log-${{ matrix.file }}"
            command -v "$pure_arg" | tee -a "results/log-${{ matrix.file }}" || command -v "$LASTDIR" | tee -a "results/log-${{ matrix.file }}" || ls /usr/local/bin | tee -a "results/log-${{ matrix.file }}"

            printf "\n-------------------------------------------------------------\n\n" | tee -a "results/log-${{ matrix.file }}"
            echo " Launchers" | tee -a "results/log-${{ matrix.file }}"
            if test -f /usr/local/share/applications/*AM.desktop 2>/dev/null; then
                 ls /usr/local/share/applications | grep "AM.desktop$" | tee -a "results/log-${{ matrix.file }}"
            else
                 echo "No .desktop file available" | tee -a "results/log-${{ matrix.file }}"
            fi

            # Cleanup
            am -R "$LASTDIR" && echo "${{ matrix.file }}" >> "results/ok-${{ matrix.file }}" || echo "${{ matrix.file }}" >> "results/ko-${{ matrix.file }}"
          else
            exit 1
          fi

      - name: "Upload Artifacts ⬆️"
        # We group all files for this job into one artifact to reduce API hits
        uses: actions/upload-artifact@v4
        with:
          name: result-${{ matrix.file }}
          path: programs/x86_64/results/
          if-no-files-found: ignore
          retention-days: 1

  update-results:
    name: "Update Results 📰"
    needs: [setup, test-app]
    runs-on: ubuntu-latest
    if: (always() && github.event.inputs.reset_stats != 'true')
    steps:
      - name: "Checkout"
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: "Download results ⬇️"
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          # merge-multiple creates folders for each artifact name
          merge-multiple: true

      - name: "Git Config"
        run: |
          git config --global user.name web-flow
          git config --global user.email "noreply@github.com"

      - name: "Process results"
        run: |
          mkdir -p results
          # Loop through all out- files from artifacts
          find artifacts -name "out-*" -type f | while read -r LogFile; do
            # Extract filename from path (artifact-name/out-app -> out-app)
            base_file=$(basename "$LogFile")
            appname=$(echo "$base_file" | cut -d'-' -f2-)
            
            # Determine status based on existence of ok or ko file in same dir
            dir=$(dirname "$LogFile")
            
            if [ -f "$dir/ko-$appname" ]; then
              echo "$appname" | tee -a failing results/excluded
              cat "$LogFile" | grep -E '(^.*=.*$|^.*----.*$)' >> results/log
            elif [ -f "$dir/ok-$appname" ]; then
              cat "$LogFile" | grep -E '(^.*=.*$|^.*----.*$)' >> results/log
              echo "$appname" >> results/tested
            fi
          done
          
          # Sort and unique
          [ -f results/tested ] && sort -u results/tested -o results/tested
          [ -f results/excluded ] && sort -u results/excluded -o results/excluded
          [ -f failing ] && sort -u failing -o failing
          
          # Add to git
          git add results

      - name: "Summary & Push"
        run: |
          tested=$(wc -l < results/tested 2>/dev/null || echo 0)
          excluded=$(wc -l < results/excluded 2>/dev/null || echo 0)
          fail=$(wc -l < failing 2>/dev/null || echo 0)
          
          # Calculate remaining (estimation based on previous total)
          total=${{ needs.setup.outputs.total_count }}
          remaining=$((total - tested - excluded))
          (( remaining < 0 )) && remaining=0

          echo "🏁 $tested tested" >> $GITHUB_STEP_SUMMARY
          if [[ "$fail" != '0' ]]; then echo ":x: $fail excluded now" >> $GITHUB_STEP_SUMMARY; fi
          if [[ "$excluded" != '0' ]]; then echo "😱 $excluded excluded" >> $GITHUB_STEP_SUMMARY; fi
          echo "### 🛅 $remaining to test" >> $GITHUB_STEP_SUMMARY

          if [[ "$GITHUB_REF" == 'refs/pull/*' ]]; then
            echo "PR detected, skipping push."
          elif git diff-index --quiet HEAD --; then
            echo "No changes to commit."
          else
            git commit -m "check [skip ci]"
            git push --force-with-lease && echo "sync successful" || (git diff && git status)
          fi

  reset-if-done:
    name: "All Done 🏁"
    runs-on: ubuntu-latest
    needs: setup
    if: ${{ needs.setup.outputs.skip == 'true' }}
    steps:
      - name: "Checkout"
        uses: actions/checkout@v6

      - name: "Reset Stats"
        run: |
          echo "All apps tested. Resetting stats..." >> $GITHUB_STEP_SUMMARY
          git config --global user.name web-flow
          git config --global user.email "noreply@github.com"
          git rm -r results || true
          git commit -m "reset stats [all tested]" || true
          git push --force || true
          git clean -f
